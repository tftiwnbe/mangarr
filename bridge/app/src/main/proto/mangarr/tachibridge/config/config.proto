syntax = "proto3";

package mangarr.tachibridge.config;

option go_package = ".";
option java_multiple_files = true;
option java_package = "mangarr.tachibridge.config";

// Repository configuration

message SetRepoUrlRequest {
  string url = 1;
}

message SetRepoUrlResponse {
  bool success = 1;
  string error = 2;
}

// FlareSolverr configuration

message FlareSolverrConfig {
  bool enabled = 1;
  string url = 2;
  int32 timeout_seconds = 3;
  bool response_fallback = 4;
  optional string session_name = 5;
  optional int32 session_ttl_minutes = 6;
}

message GetFlareSolverrConfigRequest {}

message GetFlareSolverrConfigResponse {
  FlareSolverrConfig config = 1;
}

message SetFlareSolverrConfigRequest {
  FlareSolverrConfig config = 1;
}

message SetFlareSolverrConfigResponse {
  bool success = 1;
  string error = 2;
}

// Proxy configuration

message ProxyConfig {
  string hostname = 1;
  int32 port = 2;
  optional string username = 3;
  optional string password = 4;
  string ignored_addresses = 5;
  bool bypass_local_addresses = 6;
}

message GetProxyConfigRequest {}

message GetProxyConfigResponse {
  ProxyConfig config = 1;
}

message SetProxyConfigRequest {
  ProxyConfig config = 1;
}

message SetProxyConfigResponse {
  bool success = 1;
  string error = 2;
}

message SetExtensionProxyRequest {
  string package_name = 1;
  bool use_proxy = 2;
}

message SetExtensionProxyResponse {
  bool success = 1;
  string error = 2;
}
