services:
  mangarr:
    platform: linux/amd64
    image: ${MANGARR_IMAGE:-mangarr:local}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - MANGARR_PUBLIC_URL=${MANGARR_PUBLIC_URL:-http://127.0.0.1:3737}
      - CONVEX_POSTGRES_URL=postgresql://${MANGARR_POSTGRES_USER:-mangarr}:${MANGARR_POSTGRES_PASSWORD:-mangarr-postgres}@postgres:5432
    ports:
      - "3737:3737"
    volumes:
      - ./config:/app/config
      - ./data:/app/downloads
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_DB=${MANGARR_POSTGRES_DB:-mangarr}
      - POSTGRES_USER=${MANGARR_POSTGRES_USER:-mangarr}
      - POSTGRES_PASSWORD=${MANGARR_POSTGRES_PASSWORD:-mangarr-postgres}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
