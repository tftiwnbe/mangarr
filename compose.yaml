services:
  mangarr:
    platform: linux/amd64
    image: ${MANGARR_IMAGE:?Set MANGARR_IMAGE to a pinned image tag or digest}
    environment:
      - MANGARR_PUBLIC_URL=https://mangarr.hmphin.space
    ports:
      - "3737:3737"
    volumes:
      - ./config:/app/config
      - ./data:/app/downloads
    restart: unless-stopped
