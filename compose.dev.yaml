services:
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - convex_data:/convex/data
    environment:
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3210
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3211
      - DISABLE_BEACON=true
      - DISABLE_METRICS_ENDPOINT=true
      - INSTANCE_NAME=mangarr-dev
      - INSTANCE_SECRET=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      start_period: 10s

  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:3210
    depends_on:
      convex-backend:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-dev
    working_dir: /app/web
    init: true
    depends_on:
      convex-backend:
        condition: service_healthy
    ports:
      - "3737:3000"
    environment:
      - CI=true
      - PUBLIC_CONVEX_URL=http://127.0.0.1:3210
      - CONVEX_SELF_HOSTED_URL=http://convex-backend:3210
      - CONVEX_URL=http://convex-backend:3210
      - CONVEX_ADMIN_KEY=mangarr-dev|017d2981db031fce1d83c074abf4c2cf7a51bce8874e23b9964936b367eac682d6b7097b86
      - CONVEX_SELF_HOSTED_ADMIN_KEY=mangarr-dev|017d2981db031fce1d83c074abf4c2cf7a51bce8874e23b9964936b367eac682d6b7097b86
      - MANGARR_WORKER_URL=http://worker:3212
      - MANGARR_WORKER_SERVICE_SECRET=mangarr-internal-service-secret
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: >
      sh -c "pnpm install --frozen-lockfile && pnpm run dev --host 0.0.0.0 --port 3000"
    volumes:
      - ./web:/app/web
      - web_node_modules:/app/web/node_modules

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker-dev
    working_dir: /app/worker
    init: true
    depends_on:
      convex-backend:
        condition: service_healthy
    ports:
      - "3212:3212"
    environment:
      - CI=true
      - MANGARR_WORKER_HOST=0.0.0.0
      - MANGARR_WORKER_PORT=3212
      - MANGARR_WORKER_SERVICE_SECRET=mangarr-internal-service-secret
      - CONVEX_ADMIN_KEY=mangarr-dev|017d2981db031fce1d83c074abf4c2cf7a51bce8874e23b9964936b367eac682d6b7097b86
      - CONVEX_SELF_HOSTED_ADMIN_KEY=mangarr-dev|017d2981db031fce1d83c074abf4c2cf7a51bce8874e23b9964936b367eac682d6b7097b86
      - TACHIBRIDGE_PORT=8181
      - TACHIBRIDGE_JAR_PATH=/app/bin/tachibridge.jar
    command: >
      sh -c "pnpm install --frozen-lockfile && pnpm run dev"
    volumes:
      - ./worker:/app/worker
      - worker_node_modules:/app/worker/node_modules

volumes:
  convex_data:
  web_node_modules:
  worker_node_modules:
