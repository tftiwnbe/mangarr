services:
  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://localhost:3210
    depends_on:
      mangarr:
        condition: service_started

  mangarr:
    build:
      context: .
      dockerfile: Dockerfile
      target: mangarr-dev
    ports:
      - "3737:3737"
      - "3210:3210"
    volumes:
      - ./config:/app/config
      - ./data:/app/downloads
      - ./web:/app/web
      - web_node_modules:/app/web/node_modules

volumes:
  web_node_modules:
