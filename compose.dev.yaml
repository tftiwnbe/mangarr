services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "uv sync --frozen --no-dev && uv run --no-sync fastapi dev --host 0.0.0.0 --port 3737"
    environment:
      - MANGARR__SERVER__HOST=0.0.0.0
      - MANGARR__SERVER__PORT=3737
    ports:
      - 3737:3737
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3737/api/v2/health', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    volumes:
      - ./server/app:/app/server/app
      - ./server/alembic:/app/server/alembic
      - ./server/alembic.ini:/app/server/alembic.ini
      - ./config:/app/config
      - ./data:/app/data

  web:
    image: node:20-alpine
    working_dir: /app/web
    command: >
      sh -c "corepack enable pnpm && pnpm install && pnpm run dev --host 0.0.0.0 --port 3000"
    environment:
      - WEB_FASTAPI_BACKEND=http://server:3737
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - ./web:/app/web
      - web_node_modules:/app/web/node_modules

volumes:
  web_node_modules:
