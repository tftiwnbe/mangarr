services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "uv run --no-sync fastapi dev --host 0.0.0.0 --port 3737"
    init: true
    ports:
      - 3737:3737
    volumes:
      - ./server/app:/app/server/app
      - ./server/alembic:/app/server/alembic
      - ./server/alembic.ini:/app/server/alembic.ini
      - ./config:/app/config
      - ./data:/app/data

  web:
    image: node:20-alpine
    working_dir: /app/web
    command: >
      sh -c "corepack enable pnpm && if [ ! -d node_modules/.pnpm ]; then pnpm install --frozen-lockfile; fi && pnpm run dev --host 0.0.0.0 --port 3000"
    environment:
      - WEB_FASTAPI_BACKEND=http://server:3737
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    init: true
    depends_on:
      - server
    ports:
      - 3000:3000
    volumes:
      - ./web:/app/web
      - web_node_modules:/app/web/node_modules

volumes:
  web_node_modules:
