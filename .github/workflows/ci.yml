name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  server:
    name: server
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install server dependencies
        run: cd server && uv sync --group dev

      - name: Check server formatting
        run: cd server && uv run --group dev ruff format --check .

      - name: Run server lint
        run: cd server && uv run --group dev ruff check .

      - name: Run server tests if present
        run: |
          cd server
          if rg --files -g 'test_*.py' -g '*_test.py' >/dev/null; then
            uv run --group dev pytest
          else
            echo "No server tests found; skipping pytest."
          fi

      - name: Byte-compile server
        run: cd server && uv run python -m compileall app

  web:
    name: web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Run web lint
        run: cd web && pnpm run lint

      - name: Run web checks
        run: cd web && pnpm run check:all

      - name: Build web client
        run: cd web && pnpm run build

  bridge:
    name: bridge
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Prepare Android compatibility stubs
        run: bash ./bridge/AndroidCompat/getAndroid.sh

      - name: Run bridge lint
        run: cd bridge && ./gradlew ktlintCheck --no-daemon

      - name: Build bridge
        run: cd bridge && ./gradlew build shadowJar --no-daemon

  docker-smoke:
    name: docker-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: mangarr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --name mangarr-smoke -p 3737:3737 mangarr:ci

      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3737/api/v2/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Health check did not pass in time."
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker logs mangarr-smoke

      - name: Stop container
        if: always()
        run: docker rm -f mangarr-smoke || true
