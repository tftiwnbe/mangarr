name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Run web lint
        run: cd web && pnpm run lint

      - name: Run web checks
        run: cd web && pnpm run check

      - name: Build web client
        run: cd web && pnpm run build

  bridge:
    name: bridge
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Restore Android compatibility stub cache
        uses: actions/cache@v4
        with:
          path: bridge/app/lib/android.jar
          key: ${{ runner.os }}-androidcompat-${{ hashFiles('bridge/AndroidCompat/getAndroid.sh', 'bridge/AndroidCompat/build.gradle.kts', 'bridge/app/build.gradle.kts') }}

      - name: Prepare Android compatibility stubs
        run: test -f bridge/app/lib/android.jar || bash ./bridge/AndroidCompat/getAndroid.sh

      - name: Run bridge lint
        run: cd bridge && ./gradlew ktlintCheck --no-daemon

      - name: Build bridge
        run: cd bridge && ./gradlew build shadowJar --no-daemon
