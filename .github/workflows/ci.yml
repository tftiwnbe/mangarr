name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: cd web && pnpm exec playwright install --with-deps chromium

      - name: Run web lint
        run: cd web && pnpm run lint

      - name: Run web checks
        run: cd web && pnpm run check

      - name: Run web unit tests
        run: cd web && pnpm run test:unit -- --run

      - name: Build web client
        run: cd web && pnpm run build

  bridge:
    name: bridge
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Restore Android compatibility stub cache
        uses: actions/cache@v6
        with:
          path: bridge/app/lib/android.jar
          key: ${{ runner.os }}-androidcompat-${{ hashFiles('bridge/AndroidCompat/getAndroid.sh', 'bridge/AndroidCompat/build.gradle.kts', 'bridge/app/build.gradle.kts') }}

      - name: Prepare Android compatibility stubs
        run: test -f bridge/app/lib/android.jar || bash ./bridge/AndroidCompat/getAndroid.sh

      - name: Run bridge lint
        run: cd bridge && ./gradlew ktlintCheck --no-daemon

      - name: Build bridge
        run: cd bridge && ./gradlew build --no-daemon

  e2e-smoke:
    name: e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MANGARR_VERIFY_PORT: "3737"
      MANGARR_VERIFY_KCEF_ENABLED: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: cd web && pnpm exec playwright install --with-deps chromium

      - name: Prepare isolated runtime volumes
        run: |
          runtime_root="$RUNNER_TEMP/mangarr-e2e"
          echo "MANGARR_VERIFY_CONFIG_DIR=$runtime_root/config" >> "$GITHUB_ENV"
          echo "MANGARR_VERIFY_DOWNLOADS_DIR=$runtime_root/downloads" >> "$GITHUB_ENV"
          echo "MANGARR_VERIFY_POSTGRES_DIR=$runtime_root/postgres" >> "$GITHUB_ENV"
          mkdir -p "$runtime_root/config" "$runtime_root/downloads" "$runtime_root/postgres"

      - name: Start production-like stack
        run: docker compose -p mangarr-e2e -f compose.verify.yaml up -d --build --wait --wait-timeout 300

      - name: Verify runtime services
        run: |
          docker compose -p mangarr-e2e -f compose.verify.yaml exec -T postgres pg_isready -U mangarr -d mangarr
          docker compose -p mangarr-e2e -f compose.verify.yaml exec -T mangarr curl -fsS http://127.0.0.1:3212/health >/dev/null

      - name: Wait for web app
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3737/login >/dev/null 2>/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -p mangarr-e2e -f compose.verify.yaml logs >&2 || true
          exit 1

      - name: Run runtime smoke tests
        run: cd web && PLAYWRIGHT_BASE_URL=http://127.0.0.1:3737 pnpm run test:e2e:runtime-smoke

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -p mangarr-e2e -f compose.verify.yaml logs >&2 || true

      - name: Stop production-like stack
        if: always()
        run: docker compose -p mangarr-e2e -f compose.verify.yaml down --remove-orphans --volumes
