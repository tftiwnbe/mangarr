name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  server:
    name: server
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install server dependencies
        run: cd server && uv sync --group dev

      - name: Run server CI
        run: just ci-server

  web:
    name: web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Run web CI
        run: just ci-web

  bridge:
    name: bridge
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Prepare Android compatibility stubs
        run: bash ./bridge/AndroidCompat/getAndroid.sh

      - name: Run bridge CI
        run: just ci-bridge

  docker-smoke:
    name: docker-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: mangarr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --name mangarr-smoke -p 3737:3737 mangarr:ci

      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3737/api/v2/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Health check did not pass in time."
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker logs mangarr-smoke

      - name: Stop container
        if: always()
        run: docker rm -f mangarr-smoke || true
