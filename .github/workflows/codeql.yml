name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  python-javascript:
    name: python-javascript
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python,javascript-typescript
          build-mode: none
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  java-kotlin:
    name: java-kotlin
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          queries: security-and-quality

      - name: Prepare Android compatibility stubs
        run: bash ./bridge/AndroidCompat/getAndroid.sh

      - name: Build bridge
        run: cd bridge && ./gradlew build --no-daemon

      - name: Analyze
        uses: github/codeql-action/analyze@v4
