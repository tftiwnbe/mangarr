name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  web-runtime:
    name: web-runtime
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Build web client
        run: cd web && pnpm run build

      - name: Prepare web runtime artifact
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          runtime_root="$tmpdir/app/web"
          mkdir -p "$runtime_root/src/lib/server" "$runtime_root/src/lib" "$runtime_root/.svelte-kit"
          cp web/package.json "$runtime_root/package.json"
          cp web/pnpm-lock.yaml "$runtime_root/pnpm-lock.yaml"
          cp web/pnpm-workspace.yaml "$runtime_root/pnpm-workspace.yaml"
          cp web/convex.json "$runtime_root/convex.json"
          cp web/server.js "$runtime_root/server.js"
          cp web/tsconfig.json "$runtime_root/tsconfig.json"
          cp web/.svelte-kit/tsconfig.json "$runtime_root/.svelte-kit/tsconfig.json"
          cp -R web/build "$runtime_root/build"
          cp -R web/src/convex "$runtime_root/src/convex"
          cp -R web/src/lib/utils "$runtime_root/src/lib/utils"
          cp web/src/lib/server/convex-auth-config.ts "$runtime_root/src/lib/server/convex-auth-config.ts"
          (
            cd "$runtime_root"
            pnpm install --frozen-lockfile --prod --prefer-offline
          )
          tar -C "$tmpdir" -czf "$RUNNER_TEMP/web-runtime.tgz" app

      - name: Upload web runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-runtime
          path: ${{ runner.temp }}/web-runtime.tgz
          if-no-files-found: error

  bridge-runtime:
    name: bridge-runtime
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Restore Android compatibility stub cache
        uses: actions/cache@v4
        with:
          path: bridge/app/lib/android.jar
          key: ${{ runner.os }}-androidcompat-${{ hashFiles('bridge/AndroidCompat/getAndroid.sh', 'bridge/AndroidCompat/build.gradle.kts', 'bridge/app/build.gradle.kts') }}

      - name: Prepare Android compatibility stubs
        run: test -f bridge/app/lib/android.jar || bash ./bridge/AndroidCompat/getAndroid.sh

      - name: Build bridge runtime
        run: cd bridge && ./gradlew shadowJar --no-daemon

      - name: Prepare bridge runtime artifact
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          mkdir -p "$tmpdir/app/bin"
          jar_path="$(find bridge/app/build -maxdepth 1 -type f -name 'tachibridge-*.jar' | head -n1)"
          if [ -z "$jar_path" ]; then
            echo "tachibridge shadowJar not found under bridge/app/build" >&2
            exit 1
          fi
          cp "$jar_path" "$tmpdir/app/bin/tachibridge.jar"
          tar -C "$tmpdir" -czf "$RUNNER_TEMP/bridge-runtime.tgz" app

      - name: Upload bridge runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-runtime
          path: ${{ runner.temp }}/bridge-runtime.tgz
          if-no-files-found: error

  base:
    name: base
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: mangarr-base
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}-base:edge
            ghcr.io/${{ github.repository }}-base:sha-${{ github.sha }}
          cache-from: type=gha,scope=docker-release-base-amd64
          cache-to: type=gha,scope=docker-release-base-amd64,mode=max

  release:
    name: release
    runs-on: ubuntu-latest
    needs:
      - web-runtime
      - bridge-runtime
      - base

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-runtime"
          path: .artifacts/downloads

      - name: Expand runtime artifacts
        run: |
          rm -rf .artifacts/ci-context
          mkdir -p .artifacts/ci-context/web-runtime .artifacts/ci-context/bridge-runtime
          cp Dockerfile.ci .artifacts/ci-context/Dockerfile.ci
          tar -xzf .artifacts/downloads/web-runtime/web-runtime.tgz -C .artifacts/ci-context/web-runtime
          tar -xzf .artifacts/downloads/bridge-runtime/bridge-runtime.tgz -C .artifacts/ci-context/bridge-runtime

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build release candidate image locally
        uses: docker/build-push-action@v6
        with:
          context: .artifacts/ci-context
          file: .artifacts/ci-context/Dockerfile.ci
          platforms: linux/amd64
          load: true
          provenance: false
          build-args: |
            MANGARR_BASE_IMAGE=ghcr.io/${{ github.repository }}-base:sha-${{ github.sha }}
          tags: mangarr-release:local
          cache-from: type=gha,scope=docker-release-app-amd64

      - name: Smoke release candidate image
        run: |
          mkdir -p "$RUNNER_TEMP/mangarr-config" "$RUNNER_TEMP/mangarr-downloads"
          docker rm -f mangarr-release >/dev/null 2>&1 || true
          docker run -d --name mangarr-release \
            -e MANGARR_PUBLIC_URL=http://127.0.0.1:3837 \
            -p 3837:3737 \
            -v "$RUNNER_TEMP/mangarr-config:/app/config" \
            -v "$RUNNER_TEMP/mangarr-downloads:/app/downloads" \
            mangarr-release:local
          for i in $(seq 1 24); do
            if curl -fsS http://127.0.0.1:3837/login >/dev/null 2>/dev/null; then
              break
            fi
            sleep 5
            if [ "$i" -eq 24 ]; then
              docker logs mangarr-release >&2 || true
              exit 1
            fi
          done
          docker rm -f mangarr-release >/dev/null 2>&1 || true

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .artifacts/ci-context
          file: .artifacts/ci-context/Dockerfile.ci
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            MANGARR_BASE_IMAGE=ghcr.io/${{ github.repository }}-base:sha-${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-release-app-amd64
          cache-to: type=gha,scope=docker-release-app-amd64,mode=max

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"
